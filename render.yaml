services:
  - type: web
    name: kintai-app
    runtime: node
    plan: free
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kintai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: kintai-db
    plan: free
